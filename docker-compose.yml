version: '3.8'

services:
  # ─────────────────────────────────────────
  # Frontend - React SPA (Nginx)
  # ─────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Backend - FastAPI (Uvicorn)
  # ─────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend-data:/app/data
    networks:
      - app-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: investment_calc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Redis 7 - Cache (st.cache_data 대체)
  # ─────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network
    restart: unless-stopped

  # ─────────────────────────────────────────
  # Selenium Chrome - 네이버 스크래핑용
  # ─────────────────────────────────────────
  chrome:
    image: selenium/standalone-chrome:latest
    ports:
      - "4444:4444"
      - "7900:7900"
    shm_size: '2g'
    environment:
      SE_NODE_MAX_SESSIONS: 3
      SE_NODE_OVERRIDE_MAX_SESSIONS: true
    networks:
      - app-network
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  backend-data:

networks:
  app-network:
    driver: bridge
